<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Сканер → Google Apps Script</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      text-align: center;
    }
    h1 { color: #333; }
    #reader {
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      word-break: break-all;
    }
    button {
      margin: 10px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
    }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

  <h1>Сканер QR-кодів</h1>
  <p>Наведи камеру на QR-код</p>

  <div id="reader"></div>

  <div id="result">Очікування сканування...</div>

  <button onclick="html5QrcodeScanner?.clear()">Зупинити сканер</button>
  <button onclick="html5QrcodeScanner?.render(onScanSuccess)">Запустити знову</button>

  <!-- Бібліотека html5-qrcode (остання стабільна версія на 2026 рік) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script> 

  <script>
    // Заміни на свій URL Google Apps Script (doPost)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw9nOWlaf0BssEWjfYUxxWk2JnXlWtxOW_dXujeIifFewjg0Gvrmgjk-_zUW78Px7YU/exec";

    let html5QrcodeScanner;

    function onScanSuccess(decodedText, decodedResult) {
      // Зупиняємо сканер після першого успішного читання (можна прибрати)
      html5QrcodeScanner.clear();

      document.getElementById("result").innerHTML = 
        `<div class="success">Успішно зчитано!<br><strong>${decodedText}</strong></div>`;

      console.log("QR текст:", decodedText);
      console.log("Повний результат:", decodedResult);

      // Надсилаємо в Google Apps Script
      sendToGas(decodedText);
    }

    function onScanFailure(error) {
      // Помилки сканування (можна ігнорувати, вони часті)
      // console.log(`Сканування не вдалося: ${error}`);
    }

    function sendToGas(qrText) {
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",          // Важливо для GAS, бо CORS не налаштований
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ qr: qrText, timestamp: new Date().toISOString() })
      })
      .then(() => {
        document.getElementById("result").innerHTML += 
          "<br><span class='success'>Дані надіслано в Google Sheets!</span>";
      })
      .catch(err => {
        console.error("Помилка надсилання:", err);
        document.getElementById("result").innerHTML += 
          `<br><span class='error'>Помилка надсилання: ${err.message}</span>`;
      });
    }

    // Ініціалізація сканера
    function initScanner() {
      html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { 
          fps: 10, 
          qrbox: { width: 280, height: 280 }, 
          aspectRatio: 1.0,
          rememberLastUsedCamera: true
        },
        false  // не використовуємо file scanning
      );

      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // Запускаємо при завантаженні сторінки
    window.onload = initScanner;
  </script>

</body>
</html>
